<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Apple Music BG Loop</title>
</head>
<body>
  <div class="app">
    <div class="controls">
      <button id="uploadBtn" type="button">Загрузить</button>
      <button id="recordBtn" type="button">Запись 10s</button>
      <input id="fileInput" type="file" accept="image/*" hidden />
      <label class="field" for="motionMode">Движение
        <select id="motionMode">
          <option value="soft">Soft</option>
          <option value="balanced" selected>Balanced</option>
          <option value="active">Active</option>
        </select>
      </label>
      <label class="field" for="textureMode">Текстура
        <select id="textureMode">
          <option value="clean">Clean</option>
          <option value="balanced" selected>Balanced</option>
          <option value="grain">Grain</option>
        </select>
      </label>
      <div id="swatches" class="swatches" aria-label="Palette preview"></div>
      <div class="hint">1920x1080 · loop 10s</div>
    </div>

    <div class="canvas-wrap">
      <canvas id="glCanvas" width="1920" height="1080"></canvas>
    </div>

    <div id="status" class="status"></div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>

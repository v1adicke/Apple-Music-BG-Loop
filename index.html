<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Apple Music BG Loop</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: sans-serif;
      color: #d8d8d8;
      background: #000;
      padding: 10px;
    }

    .app {
      width: min(98vw, 1400px);
      display: grid;
      gap: 8px;
      margin: 0 auto;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      padding: 0;
    }

    button,
    select {
      border: 1px solid #4b4b4b;
      border-radius: 0;
      padding: 6px 10px;
      color: #eaeaea;
      background: #101010;
      font-size: 13px;
      cursor: pointer;
      min-height: 32px;
    }

    button:hover:not(:disabled),
    select:hover:not(:disabled) {
      border-color: #727272;
    }

    button:disabled {
      opacity: 0.6;
      cursor: default;
    }

    .field {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      color: #a8a8a8;
    }

    .hint {
      color: #808080;
      font-size: 12px;
      margin-left: auto;
    }

    .swatches {
      display: flex;
      flex-wrap: nowrap;
      gap: 4px;
      margin-left: 4px;
      overflow-x: auto;
      overflow-y: hidden;
    }

    .swatch {
      width: 18px;
      height: 18px;
      border: 1px solid #343434;
    }

    .canvas-wrap {
      background: #000;
      border: 1px solid #242424;
      overflow: hidden;
    }

    canvas {
      display: block;
      width: 100%;
      aspect-ratio: 16 / 9;
      height: auto;
      background: #111;
    }

    .status {
      font-size: 12px;
      color: #8f8f8f;
      min-height: 18px;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="controls">
      <button id="uploadBtn" type="button">Загрузить</button>
      <button id="recordBtn" type="button">Запись 10s</button>
      <input id="fileInput" type="file" accept="image/*" hidden />
      <label class="field" for="motionMode">Движение
        <select id="motionMode">
          <option value="soft">Soft</option>
          <option value="balanced" selected>Balanced</option>
          <option value="active">Active</option>
        </select>
      </label>
      <label class="field" for="textureMode">Текстура
        <select id="textureMode">
          <option value="clean">Clean</option>
          <option value="balanced" selected>Balanced</option>
          <option value="grain">Grain</option>
        </select>
      </label>
      <div id="swatches" class="swatches" aria-label="Palette preview"></div>
      <div class="hint">1920x1080 · loop 10s</div>
    </div>

    <div class="canvas-wrap">
      <canvas id="glCanvas" width="1920" height="1080"></canvas>
    </div>

    <div id="status" class="status"></div>
  </div>

  <script src="./src/palette.js"></script>
  <script src="./src/shaders.js"></script>
  <script src="./src/renderer.js"></script>
  <script src="./src/recorder.js"></script>
  <script src="./src/main.js"></script>
</body>
</html>
